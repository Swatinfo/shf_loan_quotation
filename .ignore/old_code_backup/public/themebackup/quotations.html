<script>
(function(){
 const BANKS = { H:'#f15a29', S:'#1d4e89', B:'#b7791f', I:'#107a4f', A:'#3a3536', K:'#9c1f2e', P:'#053870' };[no, v, cust, ltype, amt, banks[], emi, status{label,cls,sty}, advisor, created, action]
 const Q = [
 ['QT-2026-00148',3,'Priya Mehta','Home — Purchase','₹ 28,00,000',['H','S','B','I','A'],'₹ 24,098',{l:'Draft',c:'sq',s:'background:var(--paper-2);color:var(--ink-3);'},'Rahul J.','Today 10:22','edit','draft'],
 ['QT-2026-00147',1,'Anil Patel','Home — Construction','₹ 55,00,000',['H','S','B'],'₹ 47,289',{l:'Sent',c:'blue sq'},'Rahul J.','Yesterday','view','sent'],
 ['QT-2026-00146',2,'Rashmika Shah','Home — Purchase','₹ 42,50,000',['S','I'],'₹ 36,581',{l:'Converted → SHF-2026-0471',c:'green sq'},'Anita P.','2d ago','view','converted'],
 ['QT-2026-00145',1,'Kiran Desai','LAP','₹ 1,12,00,000',['H','I','A','K'],'₹ 96,428',{l:'Sent',c:'blue sq'},'Vipul M.','3d ago','view','sent'],
 ['QT-2026-00144',4,'Jayesh Trivedi','Home — Purchase','₹ 18,00,000',['A','H'],'₹ 15,490',{l:'Converted → SHF-2026-0462',c:'green sq'},'Rahul J.','4d ago','view','converted'],
 ['QT-2026-00143',1,'Dhaval Joshi','Home — Purchase','₹ 34,75,000',['K','S'],'₹ 29,912',{l:'Expired',c:'sq',s:'background:var(--red-soft);color:var(--red);'},'Anita P.','14d ago','renew','expired'],
 ['QT-2026-00142',2,'Shilpa Rao','Balance transfer','₹ 22,00,000',['P','H','B'],'₹ 18,934',{l:'Sent',c:'blue sq'},'Rahul J.','5d ago','view','sent'],
 ['QT-2026-00141',1,'Meera Oza','Top-up','₹ 6,50,000',['H'],'₹ 5,620',{l:'Draft',c:'sq',s:'background:var(--paper-2);color:var(--ink-3);'},'Anita P.','6d ago','edit','draft'],
 ['QT-2026-00140',1,'Nirav Bhatt','Home — Purchase','₹ 48,00,000',['S','A','I'],'₹ 41,322',{l:'Sent',c:'blue sq'},'Vipul M.','7d ago','view','sent'],
 ['QT-2026-00139',3,'Kavya Iyer','Home — Purchase','₹ 62,00,000',['H','B'],'₹ 53,375',{l:'Converted',c:'green sq'},'Rahul J.','9d ago','view','converted'],
 ['QT-2026-00138',1,'Suresh Mistry','Home — Construction','₹ 45,00,000',['H','I'],'₹ 38,720',{l:'Sent',c:'blue sq'},'Anita P.','10d ago','view','sent'],
 ['QT-2026-00137',2,'Ritesh Parekh','LAP','₹ 38,00,000',['S','A'],'₹ 32,695',{l:'Expired',c:'sq',s:'background:var(--red-soft);color:var(--red);'},'Anita P.','18d ago','renew','expired'],
 ['QT-2026-00136',1,'Pooja Mehta','Home — Purchase','₹ 75,00,000',['I','H'],'₹ 64,500',{l:'Converted',c:'green sq'},'Vipul M.','12d ago','view','converted'],
 ['QT-2026-00135',1,'Aditi Bhatt','Top-up','₹ 9,00,000',['H'],'₹ 7,740',{l:'Draft',c:'sq',s:'background:var(--paper-2);color:var(--ink-3);'},'Rahul J.','13d ago','edit','draft']
 ];

 function banksHtml(bs){
 return `<div class="bank-stack">${bs.map(b=>`<span class="bl" style="background:${BANKS[b]};">${b}</span>`).join('')}</div>`;
 }
 function rowHtml(q){
 const [no,v,cust,lt,amt,bs,emi,st,adv,created,action] = q;
 const vtxt = st.l.toLowerCase().includes('convert') ? 'converted' : st.l.toLowerCase().includes('expired') ? 'expired' : st.l.toLowerCase().includes('sent') ? 'sent' : 'draft';
 const sty = st.s ? `style="${st.s}"` : '';
 const actionBtn = action === 'edit' ? `<a class="btn sm ghost" href="quotation-new.html">Edit</a>` : action === 'renew' ? `<a class="btn sm ghost" data-action="toast" data-arg="Renewed">Renew</a>` : `<a class="btn sm ghost" href="quotation-show.html">View</a>`;
 return `<tr><td><input type="checkbox"></td>
 <td><span class="font-mono" style="font-weight:600;">${no}</span><div class="text-xs text-muted">v${v}${vtxt}</div></td>
 <td>${cust}</td><td>${lt}</td><td class="num tnum">${amt}</td>
 <td>${banksHtml(bs)}</td><td class="tnum">${emi}</td>
 <td><span class="badge ${st.c}" ${sty}>${st.l}</span></td>
 <td>${adv}</td><td>${created}</td><td>${actionBtn}</td>
 <td style="text-align:right;"><div class="row-actions">
 <button class="btn-ghost btn-sm" data-row-actions aria-label="Actions">⋯</button>
 <div class="row-actions-menu">
 <a href="quotation-show.html">View details</a><a href="quotation-new.html">Edit</a>
 <a href="#" data-toast="Duplicated">Duplicate</a><hr>
 <a href="#" class="danger" data-confirm-delete="Quotation">Delete</a>
 </div>
 </div></td></tr>`;
 }
 function tableHtml(rows){
 if (!rows.length) return `<div class="empty-state" style="padding:48px 24px;text-align:center;color:var(--ink-2);"><div style="font-size:36px;margin-bottom:8px;">📭</div><div style="font-weight:600;">No quotations in this view</div></div>`;
 return `<table class="tbl"><thead><tr>
 <th style="width:28px;"><input type="checkbox"></th>
 <th>Quotation #</th><th>Customer</th><th>Loan type</th><th class="num">Amount</th><th>Banks</th><th>Best EMI</th><th>Status</th><th>Advisor</th><th>Created</th><th></th><th style="width:48px;text-align:right;"></th>
 </tr></thead><tbody>${rows.map(rowHtml).join('')}</tbody></table>`;
 }
 document.getElementById('rows-all').innerHTML = tableHtml(Q);
 document.getElementById('rows-draft').innerHTML = tableHtml(Q.filter(q=>q[11]==='draft'));
 document.getElementById('rows-sent').innerHTML = tableHtml(Q.filter(q=>q[11]==='sent'));
 document.getElementById('rows-converted').innerHTML = tableHtml(Q.filter(q=>q[11]==='converted'));
 document.getElementById('rows-expired').innerHTML = tableHtml(Q.filter(q=>q[11]==='expired'));
})();
</script>
